name: "Publish Angular Libraries"
description: "Detects version-bumped Angular libraries, builds, tests, and publishes each to GitHub Packages"

inputs:
  node_version:
    required: false
    description: "Node.js version"
    default: '18'
  workspace_path:
    required: false
    description: "Relative path to the Angular workspace directory containing the projects/ folder"
    default: 'Innago-workspace'
  npm_token:
    required: true
    description: "GitHub token with packages:write permission for publishing to GitHub Packages"
  version:
    required: false
    description: "Semver version string from the semver workflow (used for job summary)"
    default: ''

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: 'https://npm.pkg.github.com/'
        scope: '@innago-property-management'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.workspace_path }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm_token }}
      run: npm ci

    - name: Detect changed library versions
      id: detect-changes
      shell: bash
      env:
        WORKSPACE: ${{ inputs.workspace_path }}
      run: |
        # Match only top-level library package.json files:
        # <workspace>/projects/<lib-name>/package.json (exactly one level deep)
        CHANGED_PKGS=$(git diff HEAD~1 HEAD --name-only \
          | grep -E "^${WORKSPACE}/projects/[^/]+/package\.json$" || true)

        if [ -z "$CHANGED_PKGS" ]; then
          echo "No library versions changed. Nothing to publish."
          echo "has_changes=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "has_changes=true" >> $GITHUB_OUTPUT
        
        # Store changed packages for next steps
        LIBS_TO_PUBLISH=""
        for PKG_PATH in $CHANGED_PKGS; do
          LIB_NAME=$(echo "$PKG_PATH" | sed "s|^${WORKSPACE}/projects/||" | cut -d'/' -f1)
          OLD_VERSION=$(git show HEAD~1:"$PKG_PATH" 2>/dev/null | jq -r '.version' || echo "")
          NEW_VERSION=$(jq -r '.version' "$PKG_PATH")

          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "✓ $LIB_NAME: ${OLD_VERSION:-new} → $NEW_VERSION"
            LIBS_TO_PUBLISH="$LIBS_TO_PUBLISH $LIB_NAME"
          else
            echo "- $LIB_NAME: Version unchanged ($NEW_VERSION)"
          fi
        done

        # Export for subsequent steps
        echo "libraries<<EOF" >> $GITHUB_OUTPUT
        echo "$LIBS_TO_PUBLISH" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Build changed libraries
      if: steps.detect-changes.outputs.has_changes == 'true'
      shell: bash
      env:
        WORKSPACE: ${{ inputs.workspace_path }}
        LIBRARIES: ${{ steps.detect-changes.outputs.libraries }}
      run: |
        set -e
        echo "Building libraries..."
        
        for LIB_NAME in $LIBRARIES; do
          echo ""
          echo "::group::Building $LIB_NAME"
          if (cd "${WORKSPACE}" && npx ng build "$LIB_NAME"); then
            echo "::notice::✓ $LIB_NAME built successfully"
          else
            echo "::error::✗ $LIB_NAME build failed"
            exit 1
          fi
          echo "::endgroup::"
        done

    - name: Test changed libraries
      if: steps.detect-changes.outputs.has_changes == 'true'
      shell: bash
      env:
        WORKSPACE: ${{ inputs.workspace_path }}
        LIBRARIES: ${{ steps.detect-changes.outputs.libraries }}
      run: |
        set -e
        echo "Testing libraries..."
        
        for LIB_NAME in $LIBRARIES; do
          echo ""
          echo "::group::Testing $LIB_NAME"
          
          SCRIPT="test:$LIB_NAME"
          if ! jq -e --arg s "$SCRIPT" '.scripts[$s]' "${WORKSPACE}/package.json" > /dev/null 2>&1; then
            echo "::error::No test script '$SCRIPT' found in ${WORKSPACE}/package.json"
            exit 1
          fi
          
          if (cd "${WORKSPACE}" && npm run "$SCRIPT"); then
            echo "::notice::✓ $LIB_NAME tests passed"
          else
            echo "::error::✗ $LIB_NAME tests failed"
            exit 1
          fi
          echo "::endgroup::"
        done

    - name: Publish libraries to GitHub Packages
      if: steps.detect-changes.outputs.has_changes == 'true'
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm_token }}
        WORKSPACE: ${{ inputs.workspace_path }}
        LIBRARIES: ${{ steps.detect-changes.outputs.libraries }}
      run: |
        set -e
        echo "Publishing libraries to GitHub Packages..."
        
        PUBLISHED=0
        for LIB_NAME in $LIBRARIES; do
          echo ""
          echo "::group::Publishing $LIB_NAME"
          
          PKG_PATH="${WORKSPACE}/projects/$LIB_NAME/package.json"
          VERSION=$(jq -r '.version' "$PKG_PATH")
          
          if (cd "${WORKSPACE}/dist/$LIB_NAME" && npm publish); then
            echo "::notice::✓ Published @innago-property-management/$LIB_NAME@$VERSION"
            PUBLISHED=$((PUBLISHED + 1))
          else
            echo "::error::✗ Failed to publish $LIB_NAME@$VERSION"
            exit 1
          fi
          echo "::endgroup::"
        done
        
        echo ""
        echo "::notice::Successfully published $PUBLISHED library/libraries"
