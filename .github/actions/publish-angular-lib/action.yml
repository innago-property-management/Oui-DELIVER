name: "Publish Angular Libraries"
description: "Detects version-bumped Angular libraries, builds, tests, and publishes each to GitHub Packages"

inputs:
  node_version:
    required: false
    description: "Node.js version"
    default: '18'
  workspace_path:
    required: false
    description: "Relative path to the Angular workspace directory containing the projects/ folder"
    default: 'Innago-workspace'
  npm_token:
    required: true
    description: "GitHub token with packages:write permission for publishing to GitHub Packages"
  publish:
    required: false
    description: "Whether to publish to NPM registry ('true' or 'false'). If 'false', only builds and tests."
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: 'https://npm.pkg.github.com/'
        scope: '@innago-property-management'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.workspace_path }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm_token }}
      run: npm ci

    - name: Detect version bumps, build, test, and publish
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm_token }}
        WORKSPACE: ${{ inputs.workspace_path }}
        PUBLISH: ${{ inputs.publish }}
      run: |
        set -e

        # Match only top-level library package.json files:
        # <workspace>/projects/<lib-name>/package.json (exactly one level deep)
        CHANGED_PKGS=$(git diff HEAD~1 HEAD --name-only \
          | grep -E "^${WORKSPACE}/projects/[^/]+/package\.json$" || true)

        if [ -z "$CHANGED_PKGS" ]; then
          echo "No library versions changed. Nothing to build."
          exit 0
        fi

        PUBLISHED=0
        BUILT=0
        FAILED=0

        for PKG_PATH in $CHANGED_PKGS; do
          # Extract lib name from folder path
          FOLDER_NAME=$(echo "$PKG_PATH" | sed "s|^${WORKSPACE}/projects/||" | cut -d'/' -f1)
          
          # Get the package name from package.json (without scope)
          PACKAGE_NAME=$(jq -r '.name' "$PKG_PATH" | sed 's|@innago-property-management/||')

          OLD_VERSION=$(git show HEAD~1:"$PKG_PATH" 2>/dev/null | jq -r '.version' || echo "")
          NEW_VERSION=$(jq -r '.version' "$PKG_PATH")

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "[$FOLDER_NAME] Version unchanged ($NEW_VERSION) — skipping."
            continue
          fi

          echo "[$FOLDER_NAME] Version bumped: ${OLD_VERSION:-new} → $NEW_VERSION"
          
          # Try to find the correct project name from angular.json
          PROJECT_NAME=""
          if [ -f "${WORKSPACE}/angular.json" ]; then
            # Check if folder name matches a project
            if jq -e --arg name "$FOLDER_NAME" '.projects[$name]' "${WORKSPACE}/angular.json" > /dev/null 2>&1; then
              PROJECT_NAME="$FOLDER_NAME"
            # Check if package name matches a project
            elif jq -e --arg name "$PACKAGE_NAME" '.projects[$name]' "${WORKSPACE}/angular.json" > /dev/null 2>&1; then
              PROJECT_NAME="$PACKAGE_NAME"
            else
              echo "::warning::[$FOLDER_NAME] Project not found in angular.json. Trying folder name..."
              PROJECT_NAME="$FOLDER_NAME"
            fi
          else
            PROJECT_NAME="$FOLDER_NAME"
          fi

          # 1. Build
          echo "[$FOLDER_NAME] Building project '$PROJECT_NAME'..."
          if ! (cd "${WORKSPACE}" && npx ng build "$PROJECT_NAME"); then
            echo "::error::[$FOLDER_NAME] Build failed for project '$PROJECT_NAME'."
            echo "::error::Possible causes:"
            echo "::error::  - Folder name mismatch: '$FOLDER_NAME' vs angular.json project name"
            echo "::error::  - TypeScript compilation errors"
            echo "::error::  - Missing dependencies"
            FAILED=$((FAILED + 1))
            continue
          fi

          # 2. Test — require a test:<lib> script in workspace package.json
          SCRIPT="test:$PROJECT_NAME"
          if ! jq -e --arg s "$SCRIPT" '.scripts[$s]' "${WORKSPACE}/package.json" > /dev/null 2>&1; then
            # Try with folder name if different
            if [ "$PROJECT_NAME" != "$FOLDER_NAME" ]; then
              SCRIPT="test:$FOLDER_NAME"
              if ! jq -e --arg s "$SCRIPT" '.scripts[$s]' "${WORKSPACE}/package.json" > /dev/null 2>&1; then
                echo "::warning::[$FOLDER_NAME] No test script found ('test:$PROJECT_NAME' or 'test:$FOLDER_NAME')."
                if [ "$PUBLISH" = "true" ]; then
                  echo "::error::[$FOLDER_NAME] Cannot publish without tests. Please add test script before publishing."
                  FAILED=$((FAILED + 1))
                  continue
                else
                  echo "[$FOLDER_NAME] Skipping tests (not required for build-only mode)."
                fi
              fi
            else
              echo "::warning::[$FOLDER_NAME] No test script '$SCRIPT' found in ${WORKSPACE}/package.json."
              if [ "$PUBLISH" = "true" ]; then
                echo "::error::[$FOLDER_NAME] Cannot publish without tests. Please add test script before publishing."
                FAILED=$((FAILED + 1))
                continue
              else
                echo "[$FOLDER_NAME] Skipping tests (not required for build-only mode)."
              fi
            fi
          else
            echo "[$FOLDER_NAME] Running tests..."
            if ! (cd "${WORKSPACE}" && npm run "$SCRIPT"); then
              echo "::error::[$FOLDER_NAME] Tests failed."
              FAILED=$((FAILED + 1))
              continue
            fi
          fi

          # 3. Publish from the compiled dist folder (only if PUBLISH=true)
          # Use the project name for dist folder lookup
          DIST_PATH="${WORKSPACE}/dist/$PROJECT_NAME"
          if [ ! -d "$DIST_PATH" ]; then
            # Try with folder name if different
            DIST_PATH="${WORKSPACE}/dist/$FOLDER_NAME"
            if [ ! -d "$DIST_PATH" ]; then
              echo "::error::[$FOLDER_NAME] Build output not found in dist/$PROJECT_NAME or dist/$FOLDER_NAME"
              FAILED=$((FAILED + 1))
              continue
            fi
          fi
          
          if [ "$PUBLISH" = "true" ]; then
            echo "[$FOLDER_NAME] Publishing from $DIST_PATH..."
            if ! (cd "$DIST_PATH" && npm publish); then
              echo "::error::[$FOLDER_NAME] Publish failed."
              FAILED=$((FAILED + 1))
              continue
            fi

            echo "[$FOLDER_NAME] Published @innago-property-management/$PACKAGE_NAME@$NEW_VERSION"
            PUBLISHED=$((PUBLISHED + 1))
          else
            echo "[$FOLDER_NAME] Build and test successful (publish skipped)"
            BUILT=$((BUILT + 1))
          fi
        done

        if [ $FAILED -ne 0 ]; then
          echo "::error::$FAILED library/libraries failed — see errors above."
          exit 1
        fi

        if [ "$PUBLISH" = "true" ]; then
          echo "✅ Published $PUBLISHED library/libraries successfully."
        else
          echo "✅ Built and tested $BUILT library/libraries successfully (publish skipped)."
        fi