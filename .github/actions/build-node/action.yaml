name: "Build Node"
description: "Builds a node app"
inputs:
  version:
    required: true
    description: "Version"
  minimumCoverage:
    required: false
    description: "Minimum code coverage percentage"
    default: "0"
  githubToken:
    required: true
    description: "Github Token for publish"
  
  testProjectPath:
    required: true
    description: "Test project discovery is from the solution if this is not set."
    default: "."
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: lts/*
    - name: Build
      id: build
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        GHCR_USER: ${{ github.actor }}
        GHCR_TOKEN: ${{ inputs.githubToken }}
        GITHUB_TOKEN: ${{ inputs.githubToken }}
      run: |
        npm ci
        npm run build
    - name: Test
      shell: bash
      env:
        TEST_PROJECT_PATH: ${{ inputs.testProjectPath }}
      run: |
        npm test --prefix "$TEST_PROJECT_PATH"
