name: Enforce TreatWarningsAsErrors

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check_treat_warnings_as_errors:
    runs-on: ubuntu-latest
    name: Check TreatWarningsAsErrors in Release Configuration
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check TreatWarningsAsErrors in Release Configuration
        run: |
          set -euo pipefail
          violations=""

          # Use process substitution to avoid subshell variable loss from pipe
          while IFS= read -r -d $'\0' project_file; do
            # Check for TreatWarningsAsErrors anywhere in the csproj
            # (may be in a Release-conditioned PropertyGroup or global PropertyGroup)
            if ! grep -q "<TreatWarningsAsErrors>true</TreatWarningsAsErrors>" "$project_file"; then
              violations="$violations"$'\n'"  - $project_file"
            fi
          done < <(find . -name "*.csproj" -not -path "*[Tt]est*" -not -path "*[Ee]xample*" -print0)

          if [ -n "$violations" ]; then
            echo "::error::The following non-test/example C# projects do not set TreatWarningsAsErrors:${violations}"
            exit 1
          else
            echo "All relevant C# projects enforce TreatWarningsAsErrors."
          fi
