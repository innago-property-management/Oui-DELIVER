name: Kaizen Code Review (Internal)

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        description: "Pull Request number to review"
        type: number
      base_branch:
        required: true
        description: "Base branch (e.g., main, develop)"
        type: string
        default: 'main'

jobs:
  kaizen-review:
    name: Kaizen Code Review
    # Only run on merged PRs (not just closed)
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write
    uses: innago-property-management/Oui-DELIVER/.github/workflows/kaizen-code-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      repository: ${{ github.repository }}
      base_branch: ${{ github.event.pull_request.base.ref || inputs.base_branch }}
    secrets:
      anthropicKey: ${{ secrets.ANTHROPIC_API_KEY }}
      githubToken: ${{ secrets.GITHUB_TOKEN }}
