name: merge-checks-python-uv

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      python_version:
        required: false
        description: "Python version to use (default: 3.12)"
        type: string
        default: "3.12"
      allowed_licenses:
        required: false
        description: "Regex pattern of allowed licenses"
        type: string
        default: "MIT|Apache|BSD|ISC|PSF|Python|Unlicense|CC0|0BSD|WTFPL"
    secrets:
      githubToken:
        description: "GitHub token for API access"
        required: false

permissions:
  contents: read

concurrency:
  group: merge-checks-python-uv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      deps_changed: ${{ steps.changes.outputs.deps_changed }}
      source_changed: ${{ steps.changes.outputs.source_changed }}
      config_changed: ${{ steps.changes.outputs.config_changed }}
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Detect changes
        id: changes
        uses: innago-property-management/Oui-DELIVER/.github/actions/detect-changes@main

  sast:
    needs: [detect]
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: semgrep-action
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1

  secrets:
    needs: [detect]
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    container:
      image: ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f  # v8.30.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: GitLeaks
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.githubToken }}
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          WORK_DIR="/__w/${{ github.repository_owner }}/${REPO_NAME}"
          CONTAINER_WORK_DIR="/__w/${REPO_NAME}/${REPO_NAME}"
          git config --global --add safe.directory "$WORK_DIR"
          git config --global --add safe.directory "$CONTAINER_WORK_DIR"
          gitleaks git --verbose --log-level trace --log-opts="-n 10"

  vulnerabilities:
    needs: [detect]
    if: needs.detect.outputs.deps_changed == 'true' || needs.detect.result != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - name: Audit dependencies
        run: |
          set -euo pipefail
          uv sync --group dev
          echo "### Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          uv run pip-audit --desc on 2>&1 | tee vuln.log
          cat vuln.log >> $GITHUB_STEP_SUMMARY

  outdated:
    needs: [detect]
    if: needs.detect.outputs.deps_changed == 'true' || needs.detect.result != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - name: Check outdated packages
        run: |
          set -euo pipefail
          echo "### Outdated Packages" >> $GITHUB_STEP_SUMMARY
          uv lock --check 2>&1 | tee lock-check.log || true
          cat lock-check.log >> $GITHUB_STEP_SUMMARY
          uv sync --group dev
          uv run pip list --outdated --format=columns | tee outdated.log
          cat outdated.log >> $GITHUB_STEP_SUMMARY

  licenses:
    needs: [detect]
    if: needs.detect.outputs.deps_changed == 'true' || needs.detect.result != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - name: Check licenses
        env:
          ALLOWED_LICENSES: ${{ inputs.allowed_licenses }}
        run: |
          set -euo pipefail
          uv sync

          echo "### License Report" >> $GITHUB_STEP_SUMMARY
          uv run --with pip-licenses pip-licenses --format=markdown >> $GITHUB_STEP_SUMMARY

          # Check for disallowed licenses
          DISALLOWED=$(uv run --with pip-licenses pip-licenses --format=csv | tail -n +2 | grep -ivE "$ALLOWED_LICENSES" || true)

          if [ -n "$DISALLOWED" ]; then
            echo "### Disallowed Licenses Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DISALLOWED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "ERROR: Found packages with disallowed licenses"
            exit 1
          fi
