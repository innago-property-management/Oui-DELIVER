name: auto-pr
on:
  workflow_dispatch:

  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pull_request:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Create GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.AUTO_PR_APP_ID }}
          private-key: ${{ secrets.AUTO_PR_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app_token.outputs.token }}
      - name: Fetch base branch for PR diff
        run: git fetch origin main --depth=1
      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          # Skip if PR already exists for this branch
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if gh pr list --head "$branch" --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "PR already exists for branch $branch, skipping."
            exit 0
          fi

          # Check head commit for wip:/draft: prefix (case-insensitive)
          draft_flag=""
          commit_msg=$(git log -1 --format=%s)
          if echo "$commit_msg" | grep -iqE '^(wip|draft):'; then
            draft_flag="--draft"
          fi

          gh pr create --fill --base main $draft_flag
