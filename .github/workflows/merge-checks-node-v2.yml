name: merge-checks-v2

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      allowed_licenses_path:
        required: true
        description: "Path to the allowed licenses JSON file"
        type: string
      ignored_packages_path:
        required: true
        description: "Path to the ignored packages JSON file"
        type: string
      # New v2 parameters
      ignored_outdated_packages:
        required: false
        description: "Comma-separated list of packages to ignore in outdated check (e.g., '@types/node@20.*,vitest@3.*')"
        type: string
        default: ""
      outdated_target:
        required: false
        description: "Target update level: latest, minor, patch, @next, @beta"
        type: string
        default: "latest"
      audit_config_path:
        required: false
        description: "Path to audit-ci.jsonc config file (optional)"
        type: string
        default: ""
      audit_level:
        required: false
        description: "Minimum severity to fail: moderate, high, critical"
        type: string
        default: "moderate"
      use_bun:
        required: false
        description: "Whether to use Bun instead of NPM"
        type: boolean
        default: false
    secrets:
      githubToken:
        description: "Github token"
        required: true

permissions:
  contents: read

concurrency:
  group: merge-checks-node-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: semgrep-action
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    container:
      image: ghcr.io/gitleaks/gitleaks:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: GitLeaks
        shell: bash
        env:
          GITHUB_TOKEN: "${{ secrets.githubToken }}"
          GH_REPOSITORY: "${{ github.repository }}"
          GH_REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          REPO_NAME="${GH_REPOSITORY##*/}"
          WORK_DIR="/__w/${GH_REPOSITORY_OWNER}/${REPO_NAME}"
          CONTAINER_WORK_DIR="/__w/${REPO_NAME}/${REPO_NAME}"
          git config --global --add safe.directory "$WORK_DIR"
          git config --global --add safe.directory "$CONTAINER_WORK_DIR"
          gitleaks git --verbose --log-level trace  --log-opts="-n 10"

  vulnerabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        if: ${{ !inputs.use_bun }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*

      - name: Setup Bun
        if: ${{ inputs.use_bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          USE_BUN: "${{ inputs.use_bun }}"
        run: |
          if [ "$USE_BUN" = "true" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Security audit
        shell: bash
        env:
          USE_BUN: "${{ inputs.use_bun }}"
          AUDIT_CONFIG_PATH: "${{ inputs.audit_config_path }}"
          AUDIT_LEVEL: "${{ inputs.audit_level }}"
        run: |
          set -o pipefail
          if [ "$USE_BUN" = "true" ]; then
            # Bun audit is built-in
            bun audit > audit.log
          else
            # Build audit-ci command as array
            AUDIT_ARGS=()

            # Use custom config if provided
            if [ -n "$AUDIT_CONFIG_PATH" ] && [ -f "$AUDIT_CONFIG_PATH" ]; then
              AUDIT_ARGS+=(--config "$AUDIT_CONFIG_PATH")
            else
              # Use input parameters for thresholds
              case "$AUDIT_LEVEL" in
                moderate)
                  AUDIT_ARGS+=(--moderate)
                  ;;
                high)
                  AUDIT_ARGS+=(--high)
                  ;;
                critical)
                  AUDIT_ARGS+=(--critical)
                  ;;
              esac
            fi
            npx --yes audit-ci "${AUDIT_ARGS[@]}" 2>&1 | tee audit.log
          fi

          # Add to step summary
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        if: ${{ !inputs.use_bun }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*

      - name: Setup Bun
        if: ${{ inputs.use_bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          USE_BUN: "${{ inputs.use_bun }}"
        run: |
          if [ "$USE_BUN" = "true" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Check outdated dependencies with npm-check-updates
        shell: bash
        env:
          USE_BUN: "${{ inputs.use_bun }}"
          OUTDATED_TARGET: "${{ inputs.outdated_target }}"
          IGNORED_OUTDATED_PACKAGES: "${{ inputs.ignored_outdated_packages }}"
        run: |
          set -o pipefail
          # Build npm-check-updates command as array (no eval)
          NCU_ARGS=(--errorLevel 1)

          # Add target filtering
          if [ -n "$OUTDATED_TARGET" ]; then
            NCU_ARGS+=(--target "$OUTDATED_TARGET")
          fi

          # Add package rejections
          if [ -n "$IGNORED_OUTDATED_PACKAGES" ]; then
            NCU_ARGS+=(--reject "$IGNORED_OUTDATED_PACKAGES")
          fi

          # Run check and capture output
          echo "Running: npx npm-check-updates ${NCU_ARGS[*]}"
          npx --yes npm-check-updates "${NCU_ARGS[@]}" 2>&1 | tee outdated.log || {
            EXIT_CODE=$?
            echo "## Outdated Dependencies Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat outdated.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$USE_BUN" = "true" ]; then
              echo "To update: \`bun x npm-check-updates -u\` then \`bun install\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "To update: \`npx npm-check-updates -u\` then \`npm install\`" >> $GITHUB_STEP_SUMMARY
            fi
            exit $EXIT_CODE
          }

          echo "✅ All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
