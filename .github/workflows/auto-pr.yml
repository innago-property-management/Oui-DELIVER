name: auto-pr
on:
  workflow_call:
    secrets:
      token:
        description: "Token with contents:read and pull-requests:write on the calling repo"
        required: true

# No concurrency block — auto-pr is only called via workflow_call from
# workflows that already have their own concurrency controls.

jobs:
  pull_request:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.token }}
      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          set -euo pipefail

          # Skip if PR already exists for this branch
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if gh pr list --head "$branch" --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "PR already exists for branch $branch, skipping."
            exit 0
          fi

          # Check head commit for wip:/draft: prefix (case-insensitive)
          draft_flag=""
          commit_msg=$(git log -1 --format=%s)
          if echo "$commit_msg" | grep -iqE '^(wip|draft):'; then
            draft_flag="--draft"
          fi

          gh pr create --fill --base main $draft_flag
